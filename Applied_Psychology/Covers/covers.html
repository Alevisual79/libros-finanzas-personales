fects how you think and feel',serie:'S01',desc:'The gut-brain connection is more powerful than we thought.',c1:'#4a0080',c2:'#9b30d0',tc:'#fff'},{num:10,title:'Exercise and Mental Health',sub:'Moving your body changes your mind',serie:'S01',desc:'Exercise is one of the most effective antidepressants known.',c1:'#4a0080',c2:'#9b30d0',tc:'#fff'},{num:11,title:'What is Anxiety Really',sub:'Understand your anxiety from the inside',serie:'S02',desc:'Anxiety is not an enemy. It is a misfired alarm.',c1:'#0d3b6e',c2:'#1a6db5',tc:'#fff'},{num:12,title:'The Cycle of Worry',sub:'Why you can't stop thinking about problems',serie:'S02',desc:'Compulsive worry is anxiety in cognitive mode.',c1:'#0d3b6e',c2:'#1a6db5',tc:'#fff'},{num:13,title:'Social Anxiety',sub:'When the presence of others becomes a threat',serie:'S02',desc:'Social anxiety is not shyness. It is something deeper and treatable.',c1:'#0d3b6e',c2:'#1a6db5',tc:'#fff'},{num:14,title:'Panic and Phobias',sub:'How extreme fears work and how to overcome them',serie:'S02',desc:'Panic is not dangerous even though it feels deadly.',c1:'#0d3b6e',c2:'#1a6db5',tc:'#fff'},{num:15,title:'Fear of Failure',sub:'How perfectionism feeds anxiety',serie:'S02',desc:'Fear of failure is often fear of being seen as insufficient.',c1:'#0d3b6e',c2:'#1a6db5',tc:'#fff'},{num:16,title:'Generalized Anxiety',sub:'Living in constant alert mode',serie:'S02',desc:'Generalized anxiety: when everything is a possible threat.',c1:'#0d3b6e',c2:'#1a6db5',tc:'#fff'},{num:17,title:'Anxiety at Work',sub:'High performance without burning out',serie:'S02',desc:'Professional anxiety not managed always ends up in burnout.',c1:'#0d3b6e',c2:'#1a6db5',tc:'#fff'},{num:18,title:'Managing Anxiety Day by Day',sub:'Practical evidence-based tools',serie:'S02',desc:'The most effective tools for daily anxiety are simple but not easy.',c1:'#0d3b6e',c2:'#1a6db5',tc:'#fff'},{num:19,title:'The Anxious Couple',sub:'When anxiety affects your relationships',serie:'S02',desc:'Anxiety in the couple creates avoidance or demand cycles.',c1:'#0d3b6e',c2:'#1a6db5',tc:'#fff'},{num:20,title:'Post-Traumatic Growth',sub:'How anxiety can become a catalyst',serie:'S02',desc:'Some people come out of traumatic experiences stronger.',c1:'#0d3b6e',c2:'#1a6db5',tc:'#fff'},{num:21,title:'Building Real Self-Esteem',sub:'More than just positive thoughts',serie:'S03',desc:'Solid self-esteem is built with coherent actions.',c1:'#006644',c2:'#00a86b',tc:'#fff'},{num:22,title:'The Inner Critic',sub:'Silence the voice that sabotages you',serie:'S03',desc:'The inner critic is a protection mechanism gone wrong.',c1:'#006644',c2:'#00a86b',tc:'#fff'},{num:23,title:'Self-Image and the Body',sub:'How you see yourself changes your entire life',serie:'S03',desc:'Body self-image affects all other areas of identity.',c1:'#006644',c2:'#00a86b',tc:'#fff'},{num:24,title:'Imposter Syndrome',sub:'Feeling like a fraud despite your achievements',serie:'S03',desc:'Imposter syndrome is more common the more capable you are.',c1:'#006644',c2:'#00a86b',tc:'#fff'},{num:25,title:'Comparisons and Social Media',sub:'Why you always come out worse',serie:'S03',desc:'Social comparison on social media is never fair or accurate.',c1:'#006644',c2:'#00a86b',tc:'#fff'},{num:26,title:'Self-Compassion',sub:'How to treat yourself the way you would treat a friend',serie:'S03',desc:'Self-compassion is not weakness. It is the most powerful motivator.',c1:'#006644',c2:'#00a86b',tc:'#fff'},{num:27,title:'Accepting Uncertainty',sub:'Live well even when you don't know what's coming',serie:'S03',desc:'Tolerance for uncertainty is one of the pillars of mental health.',c1:'#006644',c2:'#00a86b',tc:'#fff'},{num:28,title:'Self-Efficacy',sub:'Believe you can and half the work is done',serie:'S03',desc:'Self-efficacy is a learned belief that produces self-fulfilling results.',c1:'#006644',c2:'#00a86b',tc:'#fff'},{num:29,title:'Identity and Change',sub:'Who are you when everything around you changes',serie:'S03',desc ionships',sub:'How wounds from the past affect current bonds',serie:'S05',desc:'Unhealed trauma shapes relational patterns without asking permission.',c1:'#2c2c6e',c2:'#5050c0',tc:'#fff'},{num:51,title:'How Habits Form in the Brain',sub:'The neuroscience of automatism',serie:'S06',desc:'A habit requires less and less conscious effort each time you repeat it.',c1:'#5c1a5c',c2:'#a040a0',tc:'#fff'},{num:52,title:'Change Limiting Beliefs',sub:'The thoughts that keep you stuck',serie:'S06',desc:'Limiting beliefs are not facts. They are hypotheses accepted without testing.',c1:'#5c1a5c',c2:'#a040a0',tc:'#fff'},{num:53,title:'Mental Procrastination',sub:'Why you delay what matters most',serie:'S06',desc:'Procrastination is not laziness. It is emotion-based avoidance.',c1:'#5c1a5c',c2:'#a040a0',tc:'#fff'},{num:54,title:'The Psychology of Goals',sub:'Why you don't achieve what you propose',serie:'S06',desc:'Goals without emotional connection rarely survive the first obstacle.',c1:'#5c1a5c',c2:'#a040a0',tc:'#fff'},{num:55,title:'Perfectionism and Paralysis',sub:'When pursuit of the ideal stops you',serie:'S06',desc:'Perfectionism is a defense against the fear of being judged.',c1:'#5c1a5c',c2:'#a040a0',tc:'#fff'},{num:56,title:'Growth Mindset',sub:'The belief that transforms your potential',serie:'S06',desc:'Mindset is not an attitude. It is the frame from which everything is interpreted.',c1:'#5c1a5c',c2:'#a040a0',tc:'#fff'},{num:57,title:'Motivation that Lasts',sub:'Beyond initial inspiration',serie:'S06',desc:'Motivation follows action. It does not precede it.',c1:'#5c1a5c',c2:'#a040a0',tc:'#fff'},{num:58,title:'Attention and Habit',sub:'Design environments that favor desired behaviors',serie:'S06',desc:'The environment shapes behavior more than willpower.',c1:'#5c1a5c',c2:'#a040a0',tc:'#fff'},{num:59,title:'Breaking Negative Patterns',sub:'Identify and interrupt automatic cycles',serie:'S06',desc:'A pattern cannot be changed if it is not first seen.',c1:'#5c1a5c',c2:'#a04 ,desc:'Personality changes slowly but it changes with deliberate effort.',c1:'#4a2000',c2:'#8b4000',tc:'#fff'},{num:80,title:'The Psychology of Values',sub:'What you value defines who you are more than what you think',serie:'S08',desc:'Values in action are more real than values declared.',c1:'#4a2000',c2:'#8b4000',tc:'#fff'},{num:81,title:'Social Influence',sub:'Why others change what you think and do',serie:'S09',desc:'Social influence is not manipulation. It is an intrinsic feature of the human brain.',c1:'#1a1a5c',c2:'#3030a0',tc:'#fff'},{num:82,title:'Group Psychology',sub:'How the group changes the individual',serie:'S09',desc:'Groups make individuals capable of both heroism and atrocity.',c1:'#1a1a5c',c2:'#3030a0',tc:'#fff'},{num:83,title:'Conformism and Obedience',sub:'Why most people follow even when they shouldn't',serie:'S09',desc:'Conformism and obedience are normal human responses to social pressure.',c1:'#1a1a5c',c2:'#3030a0',tc:'#fff'},{num:84,title:'Propaganda and Persuasion',sub:'How ideas get into minds without permission',serie:'S09',desc:'Knowing how persuasion works is the first defense against it.',c1:'#1a1a5c',c2:'#3030a0',tc:'#fff'},{num:85,title:'Prejudice and Discrimination',sub:'The psychology of us versus them',serie:'S09',desc:'Prejudice is not an abnormality. It is a cognitive and social tendency.',c1:'#1a1a5c',c2:'#3030a0',tc:'#fff'},{num:86,title:'Empathy and Altruism',sub:'Why we help others and when we don't',serie:'S09',desc:'Helping is natural. So is passive witnessing. Social context determines which.',c1:'#1a1a5c',c2:'#3030a0',tc:'#fff'},{num:87,title:'Leadership Psychology',sub:'What actually makes people follow someone',serie:'S09',desc:'Leadership is influence. Not authority.',c1:'#1a1a5c',c2:'#3030a0',tc:'#fff'},{num:88,title:'The Psychology of Crowds',sub:'Why collective behavior surprises us',serie:'S09',desc:'A crowd thinks differently from the sum of its individuals.',c1:'#1a1a5c',c2:'#3030a0',tc:'#fff'},{num:89,title:'So
