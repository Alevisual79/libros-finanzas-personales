ion coaching create the unlimited practice environment that language learning has always needed but never had.","c1":"#001a1a","c2":"#003a3a","tc":"#7ef0e8"},{"num":80,"title":"Knowledge Retention in the AI Era","sub":"Learning That Sticks When AI Can Remember for You","serie":"Series 8: AI and Education","desc":"Why outsourcing memory to AI is efficient in the short term and expensive in the long term — and the spaced repetition, active recall, and note-taking systems that build real knowledge.","c1":"#001a1a","c2":"#003a3a","tc":"#7ef0e8"},{"num":81,"title":"The Talent War in the AI Era","sub":"What Companies Are Really Looking For","serie":"Series 9: Future of Work","desc":"How AI fluency has become a differentiating criterion in hiring, how job descriptions are changing, and how to demonstrate AI-augmented capability to the employers who value it.","c1":"#1a0d1f","c2":"#3a1f45","tc":"#d4a0f7"},{"num":82,"title":"Reinventing Your Career","sub":"How to Reposition Yourself for the Next Decade","serie":"Series 9: Future of Work","desc":"How to identify which elements of your current expertise become more valuable in the AI era — and build from that foundation rather than starting over.","c1":"#1a0d1f","c2":"#3a1f45","tc":"#d4a0f7"},{"num":83,"title":"The Freelance Economy and AI","sub":"Building a Sustainable Independent Practice","serie":"Series 9: Future of Work","desc":"How AI simultaneously threatens and empowers independent professionals — and how to position, price, and differentiate a freelance practice in the new market.","c1":"#1a0d1f","c2":"#3a1f45","tc":"#d4a0f7"},{"num":84,"title":"Remote Work and AI","sub":"The Distributed Augmented Workplace","serie":"Series 9: Future of Work","desc":"How AI tools improve async coordination, documentation, and productivity in distributed teams — and what remote organizations must be intentional about providing that AI cannot.","c1":"#1a0d1f","c2":"#3a1f45","tc":"#d4a0f7"},{"num":85,"title":"The Human Premium","sub":"Why Human Skills Matter More Than Ever","serie":"Series 9: Future of Work","desc":"The skills that become more valuable as AI handles more: judgment, empathy, ethical reasoning, genuine creativity, and how to develop them as a deliberate competitive advantage.","c1":"#1a0d1f","c2":"#3a1f45","tc":"#d4a0f7"},{"num":86,"title":"AI Leadership","sub":"Managing People Through Technological Transformation","serie":"Series 9: Future of Work","desc":"How to lead a team through AI adoption: communicating the why, managing fear, building psychological safety for experimentation, and modeling the AI practices you want others to adopt.","c1":"#1a0d1f","c2":"#3a1f45","tc":"#d4a0f7"},{"num":87,"title":"The 4-Day Work Week and AI","sub":"Productivity Without More Hours","serie":"Series 9: Future of Work","desc":"How removing the low-value work that AI handles makes the four-day work week not just possible but more productive — the evidence, the implementation, and the obstacles.","c1":"#1a0d1f","c2":"#3a1f45","tc":"#d4a0f7"},{"num":88,"title":"New Professions","sub":"Jobs That Will Exist in 2030 That Do Not Exist Today","serie":"Series 9: Future of Work","desc":"AI trainers, ethics auditors, prompt engineers, and human-AI interaction designers: the emerging professions that AI is creating and how to build skills for them now.","c1":"#1a0d1f","c2":"#3a1f45","tc":"#d4a0f7"},{"num":89,"title":"Burnout and AI","sub":"When Automation Creates New Forms of Exhaustion","serie":"Series 9: Future of Work","desc":"How AI efficiency gains turn into more work rather than more rest — and the boundaries, recovery practices, and sustainable adoption patterns that prevent AI-driven burnout.","c1":"#1a0d1f","c2":"#3a1f45","tc":"#d4a0f7"},{"num":90,"title":"The Meaning of Work","sub":"Purpose and Identity in the Age of Intelligent Machines","serie":"Series 9: Future of Work","desc":"When AI can do significant parts of your job, the question of what work means — as identity, purpose, community, and contribution — becomes urgent and personal.","c1":"#1a0d1f","c2":"#3a1f45","tc":"#d4a0f7"},{"num":91,"title":"What Makes Us Human","sub":"Intelligence Consciousness and What AI Reveals About Us","serie":"Series 10: AI and the Human Being","desc":"How building AI systems has forced more precise definitions of intelligence, consciousness, and creativity — and what those definitions reveal about human uniqueness.","c1":"#0f0f0f","c2":"#2a2a2a","tc":"#f0f0f0"},{"num":92,"title":"AI and Relationships","sub":"Companionship Emotion and the Human Connection","serie":"Series 10: AI and the Human Being","desc":"AI companions, emotional AI, and the ethical questions raised by the real comfort that some people find in synthetic relationships — and what this reveals about human needs.","c1":"#0f0f0f","c2":"#2a2a2a","tc":"#f0f0f0"},{"num":93,"title":"AI and Mental Health","sub":"Tools Risks and the Therapeutic Frontier","serie":"Series 10: AI and the Human Being","desc":"How AI mental health tools extend access to support while raising real questions about the limits of algorithmic therapy and the irreplaceable elements of the human therapeutic relationship.","c1":"#0f0f0f","c2":"#2a2a2a","tc":"#f0f0f0"},{"num":94,"title":"Creativity as Humanity","sub":"Why Human Creation Matters in the Age of Machine Generation","serie":"Series 10: AI and the Human Being","desc":"Why human creative work is valuable not because it is better than AI's on technical metrics, but because it is the expression of a specific human life, experience, and perspective.","c1":"#0f0f0f","c2":"#2a2a2a","tc":"#f0f0f0"},{"num":95,"title":"AI and Loneliness","sub":"Connection and Isolation in the Digital Age","serie":"Series 10: AI and the Human Being","desc":"The paradox of hyperconnectivity and loneliness — and why AI companions can offer temporary comfort but cannot address the underlying conditions that make human connection scarce.","c1":"#0f0f0f","c2":"#2a2a2a","tc":"#f0f0f0"},{"num":96,"title":"Wisdom vs. Intelligence","sub":"What AI Cannot Know","serie":"Series 10: AI and the Human Being","desc":"Why intelligence — however vast — is not the same as wisdom, and what wisdom requires that no intelligence system, however large, can acquire: experience, values, and the willingness to act on hard truths.","c1":"#0f0f0f","c2":"#2a2a2a","tc":"#f0f0f0"},{"num":97,"title":"The Right Pace","sub":"Choosing How Fast to Adopt AI","serie":"Series 10: AI and the Human Being","desc":"Why perpetual early adoption is a trap, and how to choose the deliberate pace of AI integration that allows genuine mastery rather than superficial familiarity with too many tools.","c1":"#0f0f0f","c2":"#2a2a2a","tc":"#f0f0f0"},{"num":98,"title":"AI and Identity","sub":"Who Are You in a World of Intelligent Machines","serie":"Series 10: AI and the Human Being","desc":"When AI replicates the skills you most identify with, the challenge is not to hold those skills tighter — it is to expand your identity to include what AI makes possible.","c1":"#0f0f0f","c2":"#2a2a2a","tc":"#f0f0f0"},{"num":99,"title":"Control and Dependence","sub":"Keeping Human Agency in the AI Era","serie":"Series 10: AI and the Human Being","desc":"The difference between AI as a tool that extends your capabilities and AI as a dependency that replaces them — and the practices that keep you capable, not just efficient.","c1":"#0f0f0f","c2":"#2a2a2a","tc":"#f0f0f0"},{"num":100,"title":"Thriving in the AI Era","sub":"The NOVA Method Applied to Your Life","serie":"Series 10: AI and the Human Being","desc":"The synthesis of the entire collection: what it means to thrive in the AI era, what Elena, Ruben, and Isabel learned across 100 books, and your practice for the decade ahead.","c1":"#0f0f0f","c2":"#2a2a2a","tc":"#f0f0f0"}];

let cur = 0;
let showFront = true;

function buildSelect() {
  const sel = document.getElementById("sel");
  sel.innerHTML = "";
  books.forEach((b, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = (b.num === 0 ? "Book 0: " : "Book " + b.num + ": ") + b.title;
    sel.appendChild(opt);
  });
  sel.value = cur;
}

function render() {
  const b = books[cur];
  document.getElementById("ctr").textContent = "Book " + (cur + 1) + " of " + books.length + " | " + b.serie;
  document.getElementById("sel").value = cur;
  document.getElementById("card").innerHTML = showFront ? frontHTML(b) : backHTML(b);
}

function frontHTML(b) {
  return "<div class=cover style=\"background:linear-gradient(160deg," + b.c1 + " 0%," + b.c2 + " 100%);color:" + b.tc + "\">" +
    "<div class=cover-top>" +
    "<div class=cover-tag>" + b.serie + "</div>" +
    "<div class=cover-num style=\"color:" + b.tc + "\">N" + String(b.num).padStart(3,"0") + "</div>" +
    "<div class=cover-title>" + b.title + "</div>" +
    "<div class=cover-sub style=\"color:" + b.tc + "\">" + b.sub + "</div>" +
    "</div>" +
    "<div class=cover-bottom>" +
    "<div class=cover-series style=\"color:" + b.tc + "\">AI Applied Intelligence</div>" +
    "<div class=cover-logo style=\"color:" + b.tc + "\">NOVA</div>" +
    "</div>" +
    "</div>";
}

function backHTML(b) {
  return "<div class=back style=\"background:linear-gradient(160deg," + b.c2 + " 0%," + b.c1 + " 100%);color:" + b.tc + "\">" +
    "<div>" +
    "<div class=back-title>" + b.title + "</div>" +
    "<div class=back-desc>" + b.desc + "</div>" +
    "<div class=back-quote>" + b.serie + "</div>" +
    "</div>" +
    "<div class=back-footer style=\"color:" + b.tc + "\">AI Applied Intelligence Collection — English Edition — NOVA Method</div>" +
    "</div>";
}

function nav(d) {
  cur = Math.max(0, Math.min(books.length - 1, cur + d));
  showFront = true;
  render();
}

function jump(v) {
  cur = parseInt(v);
  showFront = true;
  render();
}

function toggle() {
  showFront = !showFront;
  render();
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft") nav(-1);
  if (e.key === "ArrowRight") nav(1);
  if (e.key === "f" || e.key === "F") toggle();
});

buildSelect();
render();
</script></body></html>
