<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portadas — El Método 5P | 101 Libros de Finanzas Personales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#111;color:#fff;display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{width:280px;min-width:280px;background:#1a1a1a;overflow-y:auto;border-right:1px solid #333;display:flex;flex-direction:column}
#sidebar-header{padding:20px 16px;background:#0d0d0d;border-bottom:1px solid #333;position:sticky;top:0;z-index:10}
#sidebar-header h1{font-size:13px;font-weight:700;color:#fff;letter-spacing:1px;text-transform:uppercase}
#sidebar-header p{font-size:11px;color:#888;margin-top:3px}
#search{width:100%;background:#2a2a2a;border:1px solid #444;color:#fff;padding:8px 12px;border-radius:6px;font-size:12px;margin-top:10px;outline:none}
#search:focus{border-color:#666}
.serie-group{border-bottom:1px solid #2a2a2a}
.serie-label{padding:8px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#666;background:#111;position:sticky;top:0}
.book-item{padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:all 0.15s}
.book-item:hover{background:#252525}
.book-item.active{border-left-color:var(--accent);background:#222}
.book-item .num{font-size:10px;color:#666;margin-bottom:2px}
.book-item .title{font-size:12px;color:#ccc;line-height:1.4}
.book-item.active .title{color:#fff}

/* MAIN CONTENT */
#main{flex:1;overflow-y:auto;padding:32px;background:#0d0d0d;display:flex;flex-direction:column;gap:32px}
#book-header{display:flex;align-items:center;gap:16px;margin-bottom:8px}
#book-header .badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
#book-meta{font-size:13px;color:#888}
#covers-row{display:flex;gap:32px;flex-wrap:wrap}
#controls{display:flex;gap:12px;align-items:center;padding:16px 0;border-top:1px solid #222;margin-top:8px}
#controls button{padding:8px 20px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600}
.btn-print{background:#333;color:#fff}
.btn-print:hover{background:#444}
.btn-nav{background:#2a2a2a;color:#aaa}
.btn-nav:hover{background:#333;color:#fff}
#counter{font-size:12px;color:#666;margin-left:auto}

/* BOOK COVERS */
.cover-wrap{display:flex;flex-direction:column;gap:8px}
.cover-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;font-weight:600}

.portada, .contraportada{
  width:432px;
  height:648px;
  position:relative;
  overflow:hidden;
  border-radius:4px;
  box-shadow:0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
  flex-shrink:0;
}

/* PORTADA LAYOUT */
.portada{
  background:var(--primary);
  display:flex;
  flex-direction:column;
}
.portada .deco-top{
  position:absolute;top:0;right:0;width:280px;height:280px;
  background:var(--accent);opacity:0.12;border-radius:0 0 0 280px;
}
.portada .deco-line{
  position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);
}
.portada .deco-circle{
  position:absolute;bottom:-60px;left:-60px;width:240px;height:240px;
  border:40px solid var(--accent);opacity:0.08;border-radius:50%;
}
.portada .serie-band{
  position:relative;z-index:2;
  padding:16px 28px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.portada .serie-band .serie-num{
  font-size:11px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;
}
.portada .serie-band .serie-name{
  font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase;
}
.portada .serie-band .sep{color:rgba(255,255,255,0.2);margin:0 4px}
.portada .content{
  position:relative;z-index:2;
  flex:1;display:flex;flex-direction:column;justify-content:flex-end;
  padding:28px 28px 0;
}
.portada .book-number{
  font-size:11px;font-weight:600;color:var(--accent);letter-spacing:3px;text-transform:uppercase;
  margin-bottom:16px;opacity:0.8;
}
.portada .main-title{
  font-family:'Playfair Display',serif;
  font-size:var(--title-size, 28px);
  font-weight:900;
  color:#fff;
  line-height:1.2;
  margin-bottom:16px;
}
.portada .subtitle{
  font-size:13px;color:rgba(255,255,255,0.6);line-height:1.6;
  margin-bottom:20px;font-style:italic;
}
.portada .accent-line{
  width:48px;height:3px;background:var(--accent);margin-bottom:24px;
}
.portada .bottom-band{
  position:relative;z-index:2;
  background:rgba(0,0,0,0.3);
  padding:14px 28px;
  display:flex;justify-content:space-between;align-items:center;
  border-top:1px solid rgba(255,255,255,0.06);
}
.portada .author{font-size:12px;color:rgba(255,255,255,0.7);font-weight:500}
.portada .metodo-badge{
  font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1px;
  text-transform:uppercase;border:1px solid var(--accent);padding:4px 10px;border-radius:3px;opacity:0.8;
}
.portada .deco-geo{
  position:absolute;right:28px;top:80px;z-index:1;opacity:0.06;
  font-size:180px;font-family:'Playfair Display',serif;font-weight:900;color:#fff;line-height:1;
  pointer-events:none;letter-spacing:-5px;
}

/* CONTRAPORTADA LAYOUT */
.contraportada{
  background:var(--light);
  display:flex;flex-direction:column;
}
.contraportada .top-stripe{
  background:var(--primary);height:6px;flex-shrink:0;
}
.contraportada .cp-header{
  background:var(--primary);
  padding:20px 28px 24px;
  flex-shrink:0;
}
.contraportada .cp-tagline{
  font-family:'Playfair Display',serif;
  font-size:15px;
  font-weight:700;
  color:#fff;
  line-height:1.5;
  font-style:italic;
}
.contraportada .cp-title-small{
  font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;margin-top:8px;
}
.contraportada .cp-body{
  flex:1;padding:22px 28px;overflow:hidden;
  color:var(--primary);
}
.contraportada .cp-sinopsis{
  font-size:12.5px;line-height:1.75;color:#333;margin-bottom:18px;
}
.contraportada .cp-bullets{margin-bottom:16px}
.contraportada .cp-bullet{
  display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;
  font-size:12px;line-height:1.5;color:#444;
}
.contraportada .cp-bullet::before{
  content:'';display:block;width:8px;height:8px;min-width:8px;
  background:var(--accent);border-radius:50%;margin-top:4px;
}
.contraportada .cp-footer{
  background:var(--primary);padding:14px 28px;
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}
.contraportada .cp-serie-info{font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:0.5px;line-height:1.6}
.contraportada .cp-serie-info strong{color:rgba(255,255,255,0.85);display:block;font-size:11px}
.contraportada .barcode-area{
  width:80px;height:48px;background:rgba(255,255,255,0.08);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:0.5px;text-align:center;
}
.contraportada .cp-accent-bar{
  height:3px;background:var(--accent);margin:0 0 18px;
}

/* PRINT */
@media print{
  body{background:#fff;height:auto;overflow:auto;display:block}
  #sidebar,#controls,#book-header{display:none!important}
  #main{padding:0;background:#fff;overflow:visible}
  #covers-row{gap:0;page-break-inside:avoid}
  .portada,.contraportada{
    width:6in;height:9in;page-break-after:always;
    box-shadow:none;border-radius:0;
  }
  .cover-wrap{gap:0}
  .cover-label{display:none}
}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#555}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>El Método 5P</h1>
    <p>101 Libros · Finanzas Personales</p>
    <input id="search" type="text" placeholder="Buscar libro..." oninput="filterBooks(this.value)">

</div>

<div id="main">

    <span id="hdr-badge" class="badge"></span>
    <span id="hdr-meta" class="book-meta"></span>
  </div>
  <div id="covers-row">
    <div class="cover-wrap">
      <div class="cover-label">Portada</div>
      <div class="portada" id="portada"></div>
    </div>
    <div class="cover-wrap">
      <div class="cover-label">Contraportada</div>
      <div class="contraportada" id="contraportada"></div>
    </div>
  </div>
  <div id="controls">
    <button class="btn-nav" onclick="navigate(-1)">← Anterior</button>
    <button class="btn-nav" onclick="navigate(1)">Siguiente →</button>
    <button class="btn-print" onclick="window.print()">Imprimir / PDF</button>
    <span id="counter"></span>
  </div>
</div>

<script>
const SERIES = [
  { id:0, nombre:'Libro Madre', shortName:'Libro 0', primary:'#0d1b2a', accent:'#d4a843', light:'#fdf6e3' },
  { id:1, nombre:'Mindset del Dinero', shortName:'Serie 1', primary:'#1e0a3c', accent:'#9b59b6', light:'#f5eeff' },
  { id:2, nombre:'Deuda Cero', shortName:'Serie 2', primary:'#4a0000', accent:'#c0392b', light:'#fff0f0' },
  { id:3, nombre:'Ahorro Sistemático', shortName:'Serie 3', primary:'#0a3d1f', accent:'#27ae60', light:'#eefaf3' },
  { id:4, nombre:'Inversión desde Cero', shortName:'Serie 4', primary:'#0a2342', accent:'#2980b9', light:'#eaf4ff' },
  { id:5, nombre:'Ingresos Múltiples', shortName:'Serie 5', primary:'#3d1a00', accent:'#e67e22', light:'#fff5e8' },
  { id:6, nombre:'Libertad Financiera', shortName:'Serie 6', primary:'#2d2000', accent:'#f1c40f', light:'#fffde6' },
  { id:7, nombre:'Dinero en Familia', shortName:'Serie 7', primary:'#003d35', accent:'#1abc9c', light:'#e8faf7' },
  { id:8, nombre:'Protección y Emergencias', shortName:'Serie 8', primary:'#0d0d3d', accent:'#5c6bc0', light:'#eaecff' },
  { id:9, nombre:'Negocios e Ingresos Extra', shortName:'Serie 9', primary:'#3d1000', accent:'#e74c3c', light:'#fff0ee' },
  { id:10, nombre:'Impuestos y Patrimonio', shortName:'Serie 10', primary:'#1a1a1a', accent:'#7f8c8d', light:'#f0f0f0' },
];

const LIBROS = [
  // LIBRO 0
  {
    id:0, serie:0, numSerie:0, numTotal:0,
    titulo:'El Método 5P',
    tituloLargo:'El Método 5P: Lo que nadie te enseñó sobre el dinero',
    subtitulo:'El libro que leerás antes de leer cualquier otro de esta serie',
    tagline:'"Las cinco reglas que el sistema nunca quiso que supieras."',
    sinopsis:'Trabajas mucho. Llegas a fin de mes. Y aun así, sientes que el dinero nunca es suficiente. No es culpa tuya. Es el sistema. El Método 5P es el antídoto: cinco pilares en el orden correcto para transformar tu situación financiera desde cero, con cualquier sueldo y sin trucos mágicos.',
    bullets:['Por qué el sistema educativo no enseña finanzas (y por qué no es un accidente)','Los 5 pilares: Perspectiva, Protección, Purga, Producción y Patrimonio','El plan concreto de Carlos y Marta: de cero ahorros a construir patrimonio real'],
    titleSize:'34px',
  },
  // SERIE 1
  {id:1,serie:1,numSerie:1,numTotal:1,titulo:'Tu relación con el dinero está rota\n(y no es culpa tuya)',tituloLargo:'Tu relación con el dinero está rota (y no es culpa tuya)',subtitulo:'Por qué pensamos mal sobre el dinero desde la infancia',tagline:'"Lo que aprendiste de pequeño sobre el dinero te está costando una fortuna."',sinopsis:'Antes de ganar más o ahorrar mejor, necesitas entender por qué piensas sobre el dinero como lo haces. Tus creencias financieras se formaron antes de los doce años y llevan décadas tomando decisiones por ti. Este libro muestra el origen del problema y cómo empezar a cambiarlo.',bullets:['Cómo se forman las creencias financieras en la infancia','Las frases que escuchaste de pequeño que te siguen gobernando','El primer paso para reprogramar tu relación con el dinero'],titleSize:'22px'},
  {id:2,serie:1,numSerie:2,numTotal:2,titulo:'El dinero no es sucio',tituloLargo:'El dinero no es sucio',subtitulo:'Desmontando las creencias que te mantienen pobre',tagline:'"Mientras creas que el dinero es malo, nunca tendrás suficiente."',sinopsis:'¿Te cuesta hablar de dinero? ¿Sientes que ganar mucho es de egoístas? Estas creencias, comunes en nuestra cultura, son el freno más eficaz para tu prosperidad. Este libro desmonta mito por mito las ideas que te mantienen pobre.',bullets:['Los 7 mitos culturales sobre el dinero más extendidos en España','La diferencia entre codicia y prosperidad','Cómo neutralizar las creencias limitantes con datos reales'],titleSize:'38px'},
  {id:3,serie:1,numSerie:3,numTotal:3,titulo:'Identidad financiera',tituloLargo:'Identidad financiera: Quién eres cuando nadie te ve gastar',subtitulo:'Cómo tu identidad determina tu cuenta bancaria',tagline:'"Tu cuenta bancaria es el espejo más honesto de quién eres."',sinopsis:'Cada decisión financiera que tomas refleja quién crees que eres. Los que se consideran gastadores gastan. Los que se ven como personas de orden ahorran. Tu identidad financiera determina tu cuenta bancaria mucho más que tu sueldo. Aquí aprendes a cambiarla.',bullets:['Qué es la identidad financiera y cómo se forma','Por qué los hábitos de dinero son consecuencia de la identidad, no al revés','Cómo adoptar una nueva identidad financiera de forma sostenible'],titleSize:'32px'},
  {id:4,serie:1,numSerie:4,numTotal:4,titulo:'La trampa del merecimiento',tituloLargo:'La trampa del merecimiento',subtitulo:'Por qué crees que no mereces ganar más y cómo salir de ahí',tagline:'"¿Crees que no mereces ganar más? El sistema cuenta con eso."',sinopsis:'Hay personas brillantes y competentes que ganan menos de la mitad de lo que deberían. No porque el mercado no las valore, sino porque ellas mismas no se valoran. La trampa del merecimiento es el convencimiento inconsciente de que tú no eres de las personas que ganan bien.',bullets:['Por qué el síndrome del impostor afecta directamente a tus ingresos','La conexión entre autoestima y capacidad de negociar un sueldo','Ejercicios concretos para reescribir tu sentido del merecimiento económico'],titleSize:'30px'},
  {id:5,serie:1,numSerie:5,numTotal:5,titulo:'Miedo al dinero',tituloLargo:'Miedo al dinero',subtitulo:'El miedo a tener, a perder y a hablar de dinero',tagline:'"Le tienes miedo a tenerlo. Le tienes miedo a perderlo. Le tienes miedo a hablarlo."',sinopsis:'El miedo al dinero es más común de lo que crees. Miedo a tener demasiado. Miedo a perderlo todo. Miedo a que otros sepan cuánto ganas. Estos miedos operan en silencio y sabotean tus decisiones financieras. Este libro los saca a la luz para quitarles poder.',bullets:['Los tres miedos financieros más comunes y cómo se manifiestan','La diferencia entre precaución inteligente y parálisis por miedo','Cómo tomar decisiones financieras sanas incluso con incertidumbre'],titleSize:'38px'},
  {id:6,serie:1,numSerie:6,numTotal:6,titulo:'El precio de la comodidad',tituloLargo:'El precio de la comodidad',subtitulo:'Cómo la zona de confort económica te cuesta una fortuna',tagline:'"Quedarte donde estás también tiene un coste. Y es enorme."',sinopsis:'La zona de confort económica no parece una trampa porque se disfraza de prudencia. Pero cada decisión incómoda que aplazas tiene un precio concreto en euros. El aumento que no pediste. La tarifa que no subiste. El banco que no cambiaste.',bullets:['Cómo calcular el coste real de tus zonas de confort financiero','El inventario de la comodidad: 5 acciones que llevas meses aplazando','Por qué el antídoto no es la imprudencia sino la acción deliberada'],titleSize:'30px'},
  {id:7,serie:1,numSerie:7,numTotal:7,titulo:'Abundancia sin postureo',tituloLargo:'Abundancia sin postureo',subtitulo:'La diferencia entre sentirse rico y serlo',tagline:'"Hay personas que parecen ricas. Y personas que lo son. No siempre son las mismas."',sinopsis:'El postureo financiero —gastar para parecer lo que no eres— es uno de los mecanismos más eficaces para no llegar nunca a la riqueza real. Abundancia sin postureo es aprender a distinguir el valor percibido del valor real.',bullets:['La paradoja del lujo: por qué los ricos de verdad no lo exhiben tanto','El coste psicológico y económico del postureo en redes sociales','Cómo construir abundancia real sin depender de la validación externa'],titleSize:'30px'},
  {id:8,serie:1,numSerie:8,numTotal:8,titulo:'Dejar de ser víctima financiera',tituloLargo:'Dejar de ser víctima financiera',subtitulo:'Cómo el sistema te perjudica y qué puedes controlar tú',tagline:'"El sistema te perjudica. Pero quedarte quejando no te ayuda."',sinopsis:'El sistema financiero está diseñado para beneficiar a quienes ya tienen capital. Eso es real. Y quejarse es comprensible. Pero la queja no paga las facturas. Este libro separa lo que el sistema hace contra ti de lo que tú puedes controlar.',bullets:['Las estructuras del sistema que realmente te perjudican (con datos)','La diferencia entre víctima del sistema y protagonista dentro del sistema','El manual del resentido productivo: usar el enfado como combustible'],titleSize:'26px'},
  {id:9,serie:1,numSerie:9,numTotal:9,titulo:'El dinero y el tiempo',tituloLargo:'El dinero y el tiempo: La ecuación que nadie te enseñó',subtitulo:'Valor hora, coste de oportunidad y decisiones inteligentes',tagline:'"Tu tiempo vale dinero. Mucho más del que te pagan."',sinopsis:'¿Cuánto vale tu hora? No lo que te pagan. Lo que vale de verdad. La mayoría sobrestima el coste de las cosas en dinero y subestima el coste en tiempo. Esta ecuación distorsionada explica miles de malas decisiones financieras.',bullets:['Cómo calcular el valor real de tu hora de vida','El coste de oportunidad: lo que renuncias sin saberlo con cada decisión','Cuándo tiene sentido contratar, delegar o hacerlo tú mismo'],titleSize:'30px'},
  {id:10,serie:1,numSerie:10,numTotal:10,titulo:'Reescribe tu historia financiera',tituloLargo:'Reescribe tu historia financiera',subtitulo:'Cómo cambiar los patrones heredados de dinero',tagline:'"Tu pasado financiero no dicta tu futuro. Pero sí tu narrativa sobre él."',sinopsis:'Todos llevamos una historia sobre el dinero que nos contamos. "Siempre he sido un desastre con el dinero." Estas narrativas son poderosas porque se autocumplen. Este libro te enseña a identificarlas y reescribirlas.',bullets:['Cómo identificar la historia financiera que te has contado hasta hoy','Por qué los patrones heredados se pueden romper (y cómo romperlos)','El ejercicio de los tres capítulos: pasado, presente y el futuro que escribes tú'],titleSize:'28px'},
  // SERIE 2
  {id:11,serie:2,numSerie:1,numTotal:11,titulo:'Deuda Cero',tituloLargo:'Deuda Cero: El método que funciona aunque ganes poco',subtitulo:'El sistema bola de nieve adaptado a la realidad española',tagline:'"Llevar cinco años pagando mínimos no es pagar. Es sobrevivir la deuda."',sinopsis:'Hay un sistema para eliminar deudas que funciona incluso con ingresos normales. No requiere un sueldo extra ni vender el coche. Requiere orden, prioridad y constancia. El método bola de nieve adaptado a la realidad española, paso a paso, deuda a deuda, hasta llegar a cero.',bullets:['El método bola de nieve y el método avalancha: cuál te conviene','Cómo liberar 200-400€ al mes que ahora se van en intereses','El plan de Carlos: de 15.000€ de deuda a cero en 36 meses'],titleSize:'36px'},
  {id:12,serie:2,numSerie:2,numTotal:12,titulo:'Tarjetas de crédito',tituloLargo:'Tarjetas de crédito: El producto financiero más caro del mundo',subtitulo:'Cómo funcionan y cómo destruirlas',tagline:'"El plástico en tu cartera puede costarte más que tu hipoteca."',sinopsis:'Las tarjetas de crédito están diseñadas para parecer convenientes mientras son devastadoras. El pago aplazado, el pago mínimo, el crédito revolving: cada característica está diseñada para maximizar los intereses que pagas.',bullets:['Cómo funciona el crédito revolving y por qué nunca saldrás pagando el mínimo','El coste real de una compra de 500€ aplazada a 24 meses','La estrategia para salir de la tarjeta sin necesitar más deuda'],titleSize:'30px'},
  {id:13,serie:2,numSerie:3,numTotal:13,titulo:'Hipoteca inteligente',tituloLargo:'Hipoteca inteligente: Lo que el banco no quiere que sepas',subtitulo:'Entender tu hipoteca y pagar menos',tagline:'"Tu hipoteca es la deuda más grande de tu vida. Casi nadie la entiende."',sinopsis:'La hipoteca media española cuesta entre 50.000 y 100.000 euros en intereses totales. La mayoría de hipotecados no saben por qué. Este libro te enseña a leer el contrato, negociar condiciones y pagar menos.',bullets:['Euríbor, diferencial y TIN vs. TAE: lo que realmente paga tu hipoteca','Cómo negociar la hipoteca con el banco antes y después de firmar','La amortización anticipada: cuándo hacerla y cuánto te ahorra'],titleSize:'30px'},
  {id:14,serie:2,numSerie:4,numTotal:14,titulo:'Crédito al consumo',tituloLargo:'Crédito al consumo: La trampa de los plazos cómodos',subtitulo:'Por qué financiar todo te arruina lentamente',tagline:'"Doce meses sin intereses. Excepto que sí hay intereses. Ocultos."',sinopsis:'El crédito al consumo está tan normalizado que parece imprescindible. No lo es. Este libro muestra el coste real de financiar el consumo y cómo salir del círculo de pagar siempre a crédito.',bullets:['El coste oculto del "sin intereses": cómo el comercio recupera el margen','Por qué el coche financiado es el mayor obstáculo para la salud financiera','La regla del dinero en mano: cómo cambiar de mentalidad de consumo'],titleSize:'28px'},
  {id:15,serie:2,numSerie:5,numTotal:15,titulo:'La deuda de estudiar',tituloLargo:'La deuda de estudiar: Préstamos universitarios y cómo salir',subtitulo:'Para los que empezaron la vida adulta endeudados',tagline:'"Empezaste la vida adulta en números rojos. Hay una salida."',sinopsis:'Los préstamos universitarios son la primera deuda que muchos jóvenes contraen, a menudo sin entender qué están firmando. Este libro es para los que empezaron endeudados: cómo gestionarla y construir un futuro financiero sobre ella.',bullets:['Cuándo tiene sentido pagar el préstamo universitario agresivamente vs. despacio','Cómo combinar la deuda educativa con el fondo de emergencia','El caso de Ana: de graduada endeudada a deuda cero en cuatro años'],titleSize:'28px'},
  {id:16,serie:2,numSerie:6,numTotal:16,titulo:'Cuando debes a Hacienda',tituloLargo:'Cuando debes a Hacienda',subtitulo:'Deudas fiscales, planes de pago y cómo negociar',tagline:'"La deuda fiscal es diferente. Y hay que tratarla de forma diferente."',sinopsis:'Deber dinero a Hacienda genera un pánico que hace que la gente tome malas decisiones: esconderse, no abrir las cartas, esperar a que pase. Este libro muestra cómo funciona la deuda fiscal en España y qué opciones tienes.',bullets:['Los plazos y procedimientos de la AEAT que necesitas conocer','Cómo negociar un aplazamiento o fraccionamiento con Hacienda','Qué pasa si no haces nada (y por qué no es una opción válida)'],titleSize:'28px'},
  {id:17,serie:2,numSerie:7,numTotal:17,titulo:'El efecto bola de nieve',tituloLargo:'El efecto bola de nieve',subtitulo:'Acelerar el pago de deudas con ingresos normales',tagline:'"Cuando eliminas una deuda, el siguiente pago se vuelve más fácil. Y el siguiente."',sinopsis:'El método bola de nieve no es solo una estrategia financiera: es psicología aplicada al dinero. Cada victoria pequeña genera motivación para la siguiente. Este libro profundiza en la mecánica y los trucos para acelerar el proceso.',bullets:['Cómo calcular tu bola de nieve actual y cuándo te quedas sin deudas','Los atajos legítimos para acelerar el proceso sin comprometer la estabilidad','Cómo manejar los meses en los que el sistema se rompe (porque se romperá)'],titleSize:'30px'},
  {id:18,serie:2,numSerie:8,numTotal:18,titulo:'Vivir sin deuda en el mundo moderno',tituloLargo:'Vivir sin deuda en el mundo moderno',subtitulo:'Es posible y no tienes que renunciar a todo',tagline:'"Todo el mundo tiene deudas. Excepto los que han decidido que no."',sinopsis:'Vivir sin deuda en una sociedad donde el crédito está en todos los escaparates parece imposible. No lo es. Este libro muestra cómo personas con ingresos normales viven sin deuda de consumo.',bullets:['El sistema de decisión para evitar volver a endeudarse','Cómo comprar coche, hacer reformas y viajar sin crédito','El fondo de objetivos: la alternativa a la financiación que casi nadie usa'],titleSize:'26px'},
  {id:19,serie:2,numSerie:9,numTotal:19,titulo:'La deuda que no ves',tituloLargo:'La deuda que no ves',subtitulo:'Deudas invisibles: suscripciones, hábitos y decisiones pequeñas',tagline:'"Hay deudas en tu cuenta que no se llaman deuda. Son igual de caras."',sinopsis:'Las deudas invisibles no están en una carta del banco. Están en las suscripciones que olvidaste cancelar, el seguro que pagas de más, el banco con comisiones que aceptaste sin negociar. En total pueden sumar 1.000-3.000€ al año.',bullets:['Auditoría completa de gastos recurrentes: suscripciones, seguros, comisiones','Cómo calcular el coste real de tus hábitos de consumo pequeños','El método de revisión anual para mantener a cero las deudas invisibles'],titleSize:'32px'},
  {id:20,serie:2,numSerie:10,numTotal:20,titulo:'Reconstruir después de las deudas',tituloLargo:'Reconstruir después de las deudas',subtitulo:'Qué hacer cuando por fin llegas a cero',tagline:'"Llegar a cero no es el final. Es el verdadero comienzo."',sinopsis:'El día que eliminas tu última deuda es uno de los más importantes de tu vida financiera. Pero llegar a cero no es suficiente: hay que saber qué hacer después para que la situación no se repita y para construir sobre esa base limpia.',bullets:['Los tres primeros pasos financieros tras llegar a deuda cero','Cómo construir el historial crediticio sano después de las deudas','El plan de transición de ahorrador a inversor desde la deuda cero'],titleSize:'26px'},
  // SERIE 3
  {id:21,serie:3,numSerie:1,numTotal:21,titulo:'Primero págate a ti',tituloLargo:'Primero págate a ti',subtitulo:'El sistema de ahorro automático que no requiere fuerza de voluntad',tagline:'"Si ahorras lo que sobra, nunca sobra nada."',sinopsis:'El ahorro por fuerza de voluntad no funciona. Funciona el ahorro automático: mover el dinero antes de que puedas gastarlo. El principio de "págate primero" es simple y transforma la vida financiera de cualquiera.',bullets:['Cómo configurar el sistema de ahorro automático en dos horas','El porcentaje correcto para ahorrar según tu situación actual','Por qué el orden de los movimientos bancarios lo cambia todo'],titleSize:'32px'},
  {id:22,serie:3,numSerie:2,numTotal:22,titulo:'Ahorra con sueldo mínimo',tituloLargo:'Ahorra con sueldo mínimo',subtitulo:'Es posible. Aquí está cómo.',tagline:'"No necesitas ganar más para empezar. Necesitas un sistema."',sinopsis:'Con el sueldo mínimo en España, ahorrar parece imposible. No lo es, pero requiere un sistema diferente al que usa alguien con ingresos altos. Este libro muestra estrategias concretas para construir un colchón financiero cuando cada euro cuenta.',bullets:['El sistema de sobres virtuales para ingresos muy ajustados','Las diez áreas donde reducir gastos sin sacrificar calidad de vida','Cómo construir un fondo de emergencia mínimo viable en seis meses'],titleSize:'28px'},
  {id:23,serie:3,numSerie:3,numTotal:23,titulo:'El presupuesto que sí funciona',tituloLargo:'El presupuesto que sí funciona',subtitulo:'Por qué fracasan todos los presupuestos y cómo hacer uno que no',tagline:'"Los presupuestos fracasan porque están mal diseñados. Este no."',sinopsis:'La mayoría de la gente hace un presupuesto una vez, lo abandona al mes siguiente y concluye que los presupuestos no son para ellos. El problema no es la disciplina: es el diseño.',bullets:['Por qué el presupuesto tradicional de categorías falla y qué usar en cambio','El método 50/30/20 y sus variantes para situaciones reales','Cómo ajustar el presupuesto cuando los ingresos son irregulares'],titleSize:'28px'},
  {id:24,serie:3,numSerie:4,numTotal:24,titulo:'Los gastos hormiga',tituloLargo:'Los gastos hormiga',subtitulo:'Cómo los gastos pequeños te roban más que los grandes',tagline:'"No es el alquiler lo que te arruina. Son los 3,50€ de cada día."',sinopsis:'Los gastos pequeños y recurrentes son invisibles individualmente pero devastadores en conjunto. Este libro te enseña a hacerlos visibles, a elegir cuáles valen la pena y a eliminar los que no aportan nada.',bullets:['Cómo hacer una auditoría de gastos hormiga en menos de una hora','La diferencia entre gasto hormiga con valor y gasto hormiga por inercia','Los 5 gastos hormiga más comunes en España y cuánto suman al año'],titleSize:'32px'},
  {id:25,serie:3,numSerie:5,numTotal:25,titulo:'Minimalismo financiero',tituloLargo:'Minimalismo financiero',subtitulo:'Gastar menos sin sentirte privado de nada',tagline:'"Gastar menos no es vivir peor. Es vivir más alineado."',sinopsis:'El minimalismo financiero no es austeridad. Es elegir gastar en lo que realmente importa y dejar de gastar en lo que no importa pero ocupaba espacio. Cuando reduces el ruido de las compras impulsivas, descubres que necesitas mucho menos.',bullets:['La diferencia entre minimalismo financiero y frugalidad extrema','El ejercicio de los 30 días: comprar menos y valorar más','Cómo rediseñar tu estilo de vida para gastar menos sin sentirte privado'],titleSize:'30px'},
  {id:26,serie:3,numSerie:6,numTotal:26,titulo:'Ahorro de emergencia',tituloLargo:'Ahorro de emergencia: Tu primer escudo',subtitulo:'Construir los 3-6 meses de colchón sin agobiarse',tagline:'"Sin fondo de emergencia, una avería puede destruir años de trabajo."',sinopsis:'El fondo de emergencia es la primera línea de defensa financiera. Sin él, cualquier imprevisto se convierte en deuda. Este libro enseña a construirlo paso a paso, cuánto necesitas realmente y dónde guardarlo.',bullets:['Cómo calcular exactamente cuánto necesitas en tu fondo de emergencia','El plan de ahorro por etapas: primero el mínimo viable, luego el objetivo','Qué cuenta usar para el fondo de emergencia y qué cuentas evitar'],titleSize:'30px'},
  {id:27,serie:3,numSerie:7,numTotal:27,titulo:'El poder del 1%',tituloLargo:'El poder del 1%',subtitulo:'Mejorar las finanzas en pequeños pasos que se acumulan',tagline:'"Mejorar un 1% cada semana significa ser el doble de bueno en un año."',sinopsis:'Los grandes cambios financieros no ocurren de golpe. Ocurren por la acumulación de mejoras pequeñas constantes. Ahorrar 10€ más al mes, reducir una suscripción, revisar un seguro: cada acción parece irrelevante. En conjunto, transforman.',bullets:['El efecto compuesto aplicado a los hábitos financieros (no solo al dinero)','Las 52 acciones del 1%: una mejora financiera por semana durante un año','Por qué el progreso lento y constante supera siempre al cambio drástico'],titleSize:'36px'},
  {id:28,serie:3,numSerie:8,numTotal:28,titulo:'Ahorro familiar',tituloLargo:'Ahorro familiar: Cuando hay más bocas que llenar',subtitulo:'Finanzas del hogar con hijos y gastos compartidos',tagline:'"Los hijos cambian las matemáticas. Pero no hacen imposible el ahorro."',sinopsis:'Ahorrar en familia requiere sincronización, negociación y sistemas que funcionen para todos. Este libro está diseñado para familias como la de Carlos y Ana: dos ingresos, dos hijos, gastos compartidos y sueños distintos.',bullets:['El presupuesto familiar: cómo diseñarlo para que todos se sientan representados','Los gastos de los hijos que se pueden optimizar sin sacrificar su bienestar','Cuenta conjunta, cuentas separadas o las dos: el modelo financiero familiar'],titleSize:'32px'},
  {id:29,serie:3,numSerie:9,numTotal:29,titulo:'El año del ahorro extremo',tituloLargo:'El año del ahorro extremo',subtitulo:'12 meses para transformar tu situación financiera',tagline:'"Un año de esfuerzo enfocado puede cambiarte la vida financiera para siempre."',sinopsis:'El ahorro extremo no es para siempre. Es una herramienta temporal: doce meses de intensidad máxima para conseguir un objetivo concreto —liquidar una deuda, construir el fondo de emergencia, llegar a la entrada de una casa.',bullets:['Cómo definir el objetivo del año de ahorro extremo y hacer las matemáticas','Las 20 áreas de gasto donde el ahorro extremo temporal es más efectivo','Cómo mantener la motivación cuando el sacrificio se hace largo'],titleSize:'28px'},
  {id:30,serie:3,numSerie:10,numTotal:30,titulo:'De ahorrador a inversor',tituloLargo:'De ahorrador a inversor: El puente',subtitulo:'Cuándo dejar de ahorrar y empezar a invertir',tagline:'"Llega un momento en que ahorrar ya no es suficiente. Este libro es ese momento."',sinopsis:'Hay personas que ahorran toda su vida y llegan a la jubilación con menos de lo esperado. No porque ahorraran poco, sino porque ahorraron sin invertir. Este libro marca el momento del cruce y te da el mapa para hacerlo.',bullets:['Cómo saber cuándo estás listo para empezar a invertir','La diferencia real entre ahorro e inversión y por qué importa la distinción','Los primeros tres meses de inversor: qué abrir, dónde y cuánto meter'],titleSize:'30px'},

  {id:31,serie:4,numSerie:1,numTotal:31,titulo:'Invertir sin saber nada',tituloLargo:'Invertir sin saber nada: Por dónde empezar',subtitulo:'Inversión indexada para principiantes absolutos',tagline:'"No necesitas saber de bolsa para invertir bien. De hecho, es mejor."',sinopsis:'La inversión está rodeada de jerga y complejidad. La realidad es que la estrategia más rentable para el 90% de las personas es también la más simple: fondos indexados, aportaciones regulares, horizonte largo.',bullets:['Por qué la estrategia más simple suele ser la más rentable','Cómo abrir una cuenta de inversión y hacer la primera compra paso a paso','Los errores del inversor principiante que destruyen rentabilidad (y cómo evitarlos)'],titleSize:'30px'},
  {id:32,serie:4,numSerie:2,numTotal:32,titulo:'ETFs',tituloLargo:'ETFs: El instrumento que los ricos no quieren que conozcas',subtitulo:'Cómo funcionan y por qué son casi perfectos',tagline:'"Un ETF te da acceso a 500 empresas con una sola orden de compra."',sinopsis:'Los ETFs son uno de los instrumentos de inversión más eficientes para el inversor particular. Comisiones bajas, diversificación instantánea, liquidez alta. Este libro te explica exactamente qué son, cómo funcionan y cómo construir una cartera sencilla y poderosa.',bullets:['La diferencia entre ETF y fondo de inversión tradicional (y por qué importa)','Cómo elegir el ETF correcto entre los miles disponibles','La cartera de tres fondos: simplicidad máxima, diversificación óptima'],titleSize:'42px'},
  {id:33,serie:4,numSerie:3,numTotal:33,titulo:'Dividendos',tituloLargo:'Dividendos: Que el dinero trabaje mientras tú duermes',subtitulo:'Construir una cartera de dividendos desde cero',tagline:'"Construye una máquina que te pague todos los meses sin que hagas nada."',sinopsis:'Invertir en empresas que reparten dividendos es una de las estrategias de construcción de riqueza más poderosas y menos comprendidas. No se trata de hacerse rico rápido: se trata de construir lentamente una cartera que genere ingresos recurrentes.',bullets:['Qué son los dividendos y por qué ciertas empresas los reparten','Cómo construir una cartera de dividendos desde 1.000€','El efecto de reinvertir dividendos durante 20 años: los números sorprenden'],titleSize:'34px'},
  {id:34,serie:4,numSerie:4,numTotal:34,titulo:'El interés compuesto\nexplicado con ejemplos reales',tituloLargo:'El interés compuesto explicado con ejemplos reales',subtitulo:'La matemática que lo cambia todo',tagline:'"La diferencia entre empezar a los 25 y a los 35 puede ser de 300.000€."',sinopsis:'El interés compuesto es el concepto financiero más importante que existe y el más mal explicado. No es un truco matemático: es la consecuencia inevitable de dejar que el dinero genere más dinero durante suficiente tiempo.',bullets:['La fórmula del interés compuesto explicada sin matemáticas complejas','Comparativas reales: qué pasa si empiezas a los 25, 35 y 45 años','El mayor error del que entiende el interés compuesto: vender en las caídas'],titleSize:'22px'},
  {id:35,serie:4,numSerie:5,numTotal:35,titulo:'Bolsa sin dramas',tituloLargo:'Bolsa sin dramas',subtitulo:'Cómo invertir en renta variable sin perder el sueño',tagline:'"La bolsa cae. La bolsa sube. Los que no hacen nada ganan más."',sinopsis:'La bolsa asusta porque sube y baja. Pero la historia demuestra que siempre se ha recuperado, siempre ha alcanzado nuevos máximos y siempre ha recompensado a quienes tuvieron paciencia.',bullets:['Por qué las caídas de bolsa son buenas noticias si eres inversor a largo plazo','Cómo calcular tu tolerancia real al riesgo (no la teórica)','La estrategia de aportaciones regulares: cómo funciona y por qué gana a casi todo'],titleSize:'36px'},
  {id:36,serie:4,numSerie:6,numTotal:36,titulo:'Fondos indexados vs fondos activos',tituloLargo:'Fondos indexados vs fondos activos: El debate que ya está resuelto',subtitulo:'Por qué casi siempre gana el índice',tagline:'"El 90% de los gestores activos no baten al índice. El 100% cobran comisiones."',sinopsis:'Durante décadas, los fondos de gestión activa prometieron batir al mercado. Los datos dicen otra cosa. Este libro presenta la evidencia de forma clara y te enseña a elegir el fondo correcto.',bullets:['Los datos sobre rentabilidad de fondos activos vs. indexados en 10, 20 y 30 años','El impacto del TER en la rentabilidad a largo plazo','Cómo seleccionar un buen fondo indexado entre los disponibles en España'],titleSize:'24px'},
  {id:37,serie:4,numSerie:7,numTotal:37,titulo:'Renta fija para los que no quieren sustos',tituloLargo:'Renta fija para los que no quieren sustos',subtitulo:'Bonos, letras del tesoro y opciones conservadoras',tagline:'"No toda la inversión tiene que ser emocionante. La aburrida también funciona."',sinopsis:'Bonos, letras del Tesoro, depósitos a plazo: los instrumentos de renta fija tienen mala fama de aburridos. Pero en un portfolio bien construido cumplen una función crucial: reducir la volatilidad y proteger parte del capital.',bullets:['Qué es la renta fija y por qué "fija" no significa "sin riesgo"','Letras del Tesoro español: cómo comprarlas directamente sin intermediarios','La proporción correcta de renta fija según tu edad e inversión'],titleSize:'24px'},

  {id:39,serie:4,numSerie:9,numTotal:39,titulo:'Criptomonedas',tituloLargo:'Criptomonedas: Lo que hay de verdad detrás del ruido',subtitulo:'Sin hype, sin miedo, con datos',tagline:'"Sin el hype. Sin el pánico. Con los datos que nadie quiere darte."',sinopsis:'Las criptomonedas generan dos tipos de personas: los que dicen que es el futuro del dinero y los que dicen que es una estafa. La realidad es más matizada. Este libro explica qué son, qué función pueden tener y cómo no perder dinero en el intento.',bullets:['Qué es realmente un blockchain y qué hace que una cripto tenga (o no) valor','La posición correcta de las criptomonedas en un portfolio: cuánto y cuál','Las señales de alerta que te avisan de que algo es un scam'],titleSize:'34px'},

  // SERIE 5
  {id:41,serie:5,numSerie:1,numTotal:41,titulo:'Tu sueldo no es suficiente\n(y el sistema lo sabe)',tituloLargo:'Tu sueldo no es suficiente (y el sistema lo sabe)',subtitulo:'Por qué una sola fuente de ingreso es el mayor riesgo',tagline:'"Una sola fuente de ingresos no es estabilidad. Es el mayor riesgo financiero."',sinopsis:'El modelo de "un trabajo, un sueldo, una fuente de ingresos" era frágil en el siglo XX. En el XXI es directamente peligroso. Este libro explica por qué y te da el mapa para construir tu segunda fuente.',bullets:['Por qué depender de un solo ingreso es el mayor riesgo financiero de tu vida','Los tres tipos de ingreso y por qué el activo es el más frágil','El primer paso para construir una segunda fuente: usar lo que ya sabes'],titleSize:'22px'},

  {id:43,serie:5,numSerie:3,numTotal:43,titulo:'Freelance desde cero',tituloLargo:'Freelance desde cero: Vende lo que ya sabes hacer',subtitulo:'Monetizar habilidades sin montar una empresa',tagline:'"Si sabes hacerlo para tu empresa, puedes cobrarlo por tu cuenta."',sinopsis:'El freelance es una de las vías más directas para aumentar ingresos usando habilidades que ya tienes. Este libro enseña cómo monetizar tu conocimiento profesional fuera del empleo, desde los primeros clientes hasta construir una cartera estable.',bullets:['Cómo identificar qué habilidades profesionales tienen mercado como freelance','La estrategia para conseguir los primeros tres clientes sin experiencia previa','Cómo fijar tarifas sin malvenderte ni espantar clientes'],titleSize:'30px'},
  {id:44,serie:5,numSerie:4,numTotal:44,titulo:'Ingresos pasivos reales vs los del Instagram',tituloLargo:'Ingresos pasivos reales vs ingresos pasivos del Instagram',subtitulo:'La diferencia entre los de verdad y los del postureo',tagline:'"El 95% de lo que se vende como ingreso pasivo requiere trabajo constante."',sinopsis:'Los ingresos pasivos de verdad existen. Pero no son los que se venden en Instagram. Requieren capital inicial o trabajo intenso, y el mantenimiento tiene un coste real. Este libro separa la fantasía de la realidad.',bullets:['La definición real de ingreso pasivo y por qué casi nada cumple el criterio','Los 5 tipos de ingreso semiactivo que sí se pueden construir desde cero','Cuánto capital o trabajo inicial necesitas realmente para cada opción'],titleSize:'22px'},
  {id:45,serie:5,numSerie:5,numTotal:45,titulo:'Vender en internet sin producto propio',tituloLargo:'Vender en internet sin tener un producto propio',subtitulo:'Afiliación, servicios, intermediación',tagline:'"El producto ya existe. Tú solo tienes que conectarlo con quien lo necesita."',sinopsis:'La afiliación, los servicios de intermediación y la consultoría online permiten generar ingresos en internet sin tener que crear nada propio. Este libro explica cómo funcionan estos modelos y cómo empezar a generar los primeros ingresos.',bullets:['Cómo funciona el marketing de afiliación y cuánto se puede ganar realmente','Intermediación digital: conectar oferta y demanda y quedarse con la diferencia','Las plataformas y herramientas para empezar sin inversión inicial'],titleSize:'24px'},

  {id:47,serie:5,numSerie:7,numTotal:47,titulo:'Monetizar tu conocimiento',tituloLargo:'Monetizar tu conocimiento',subtitulo:'Cursos, ebooks, consultoría, infoproductos',tagline:'"Lo que sabes vale dinero. Mucho más de lo que crees."',sinopsis:'Hay un mercado enorme de personas que quieren aprender lo que tú ya sabes. Cursos, ebooks, consultoría, sesiones de mentoría: el conocimiento que acumulas durante años tiene valor económico directo si sabes cómo empaquetarlo y venderlo.',bullets:['Cómo identificar qué parte de tu conocimiento tiene valor de mercado','Los formatos de producto de conocimiento y cuál encaja con tu perfil','De cero a primera venta: el roadmap de 90 días para tu infoproducto'],titleSize:'30px'},

  {id:49,serie:5,numSerie:9,numTotal:49,titulo:'El ingreso estacional',tituloLargo:'El ingreso estacional: Aprovechar los picos del año',subtitulo:'Navidad, verano, fechas clave',tagline:'"El año tiene picos de demanda. La gente que los conoce los aprovecha."',sinopsis:'Navidad, verano, Black Friday, San Valentín: el año tiene momentos donde la demanda se dispara. Conocer esos picos y prepararse para aprovecharlos puede significar un ingreso extra significativo en pocas semanas.',bullets:['El calendario de oportunidades estacionales en España','Cómo preparar y ejecutar un negocio estacional en menos de un mes','Los errores que cometen los que intentan aprovechar la estacionalidad sin sistema'],titleSize:'28px'},
  {id:50,serie:5,numSerie:10,numTotal:50,titulo:'De empleado a emprendedor',tituloLargo:'De empleado a emprendedor: La transición sin suicidio financiero',subtitulo:'Cómo hacer el salto sin arruinarte',tagline:'"El salto no tiene que ser al vacío. Puede ser un puente."',sinopsis:'Dejar el empleo para montar un negocio propio es uno de los mayores riesgos financieros. Pero hacerlo de forma planificada —con un colchón, con ingresos ya validados, con un plan de reversión— convierte el salto en un paso controlado.',bullets:['Cuándo estás realmente listo para dejar el empleo (los criterios objetivos)','El plan de transición en tres fases: construir, validar, saltar','Cómo proteger las finanzas familiares durante los primeros doce meses'],titleSize:'26px'},

  {id:51,serie:6,numSerie:1,numTotal:51,titulo:'El número',tituloLargo:'El número: Cuánto necesitas para no trabajar nunca más',subtitulo:'Calcular tu número de libertad financiera',tagline:'"Hay un número concreto. La mayoría no lo sabe. Los que lo saben, trabajan para alcanzarlo."',sinopsis:'La libertad financiera no es un sueño vago: es un número. El capital necesario para que tus inversiones generen suficiente dinero para cubrir tus gastos sin trabajar. Calcularlo lo cambia todo.',bullets:['La fórmula del número de libertad financiera y cómo calcular el tuyo','La regla del 4%: por qué funciona y cuáles son sus límites','Cómo reducir tu número cambiando el estilo de vida sin sacrificar lo esencial'],titleSize:'38px'},
  {id:52,serie:6,numSerie:2,numTotal:52,titulo:'FIRE',tituloLargo:'FIRE: El movimiento que asusta a los bancos',subtitulo:'Financial Independence, Retire Early explicado para españoles',tagline:'"Financial Independence, Retire Early. El movimiento que nadie te contó en el colegio."',sinopsis:'El movimiento FIRE no es para millonarios. Es un conjunto de principios financieros que, aplicados con constancia durante 10-15 años, permiten alcanzar la independencia financiera con ingresos normales.',bullets:['Los principios del FIRE y sus variantes: Lean, Fat y Barista FIRE','La matemática del FIRE: tasa de ahorro, años necesarios, la tabla que lo explica todo','FIRE en España: sistema fiscal, pensiones y cómo compatibilizar ambos'],titleSize:'44px'},
  {id:53,serie:6,numSerie:3,numTotal:53,titulo:'Retiro anticipado a los 45',tituloLargo:'Retiro anticipado a los 45: Un plan concreto',subtitulo:'Matemáticas, estrategia y sacrificios reales',tagline:'"No es un sueño. Es un plan de 15 años."',sinopsis:'Retirarse a los 45 no requiere herencias ni golpes de suerte. Requiere empezar pronto, ahorrar mucho e invertir bien durante suficiente tiempo. Este libro presenta el plan financiero completo para lograrlo.',bullets:['El plan financiero completo de cero a retiro en 15 años','Cuánto hay que ahorrar e invertir mensualmente para retirarse a los 45','Los riesgos del retiro anticipado y cómo mitigarlos'],titleSize:'28px'},

  {id:55,serie:6,numSerie:5,numTotal:55,titulo:'El trabajo opcional',tituloLargo:'El trabajo opcional',subtitulo:'Cuando trabajas porque quieres, no porque tienes que',tagline:'"No dejes de trabajar. Trabaja porque quieres, no porque tienes que."',sinopsis:'El objetivo de la libertad financiera no es no trabajar: es que trabajar sea una elección. Cuando el trabajo es opcional, todo cambia: la forma en que negocias, los proyectos que aceptas, la energía con la que te presentas.',bullets:['La diferencia psicológica entre trabajar por necesidad y por elección','Cómo construir la "almohada de libertad": el capital que hace el trabajo opcional','El momento en que tienes suficiente: cómo reconocerlo y qué hacer'],titleSize:'30px'},
  {id:56,serie:6,numSerie:6,numTotal:56,titulo:'Libertad financiera con sueldo medio',tituloLargo:'Libertad financiera con sueldo medio',subtitulo:'No hace falta ganar 10.000€/mes',tagline:'"No necesitas ganar 10.000€ al mes. Solo necesitas tiempo, sistema y constancia."',sinopsis:'La libertad financiera no es un privilegio de los que ganan mucho. Es el resultado de un sistema de ahorro e inversión aplicado durante suficiente tiempo. Este libro demuestra con matemáticas reales que es posible con sueldo medio.',bullets:['Los escenarios de ahorro e inversión para sueldos de 1.800€, 2.500€ y 3.500€','Cómo compensar un sueldo bajo con una tasa de ahorro alta','El mapa de decisiones para optimizar impuestos y maximizar el capital invertible'],titleSize:'24px'},
  {id:57,serie:6,numSerie:7,numTotal:57,titulo:'El coste real de tu estilo de vida',tituloLargo:'El coste real de tu estilo de vida',subtitulo:'Cuánto cuesta realmente lo que tienes y quieres',tagline:'"Cuánto cuesta lo que tienes. Cuánto cuesta lo que quieres. Son números que cambian todo."',sinopsis:'La mayoría de las personas no saben cuánto cuesta mantener su estilo de vida actual. Y mucho menos cuánto costará el que quieren tener. Calcular ambos números es el punto de partida de cualquier plan serio.',bullets:['Cómo calcular el coste real de tu estilo de vida actual','El test de los deseos: distinguir los que aumentan tu libertad de los que la reducen','Cómo diseñar un "estilo de vida suficiente" que costee la libertad financiera'],titleSize:'24px'},

  {id:59,serie:6,numSerie:9,numTotal:59,titulo:'Libertad financiera en pareja',tituloLargo:'Libertad financiera en pareja',subtitulo:'Cuando dos tienen que ponerse de acuerdo en el mismo objetivo',tagline:'"Alcanzar la libertad financiera solo es difícil. En pareja, puede ser más fácil o imposible."',sinopsis:'La libertad financiera en pareja requiere visión compartida, acuerdos sobre el estilo de vida y un sistema financiero conjunto que funcione para los dos.',bullets:['Cómo alinear los objetivos financieros cuando dos tienen prioridades distintas','El sistema financiero de pareja que maximiza el ahorro conjunto','Cómo gestionar los tiempos distintos cuando uno alcanza la meta antes que el otro'],titleSize:'26px'},

let currentIdx = 0;

function getSerie(serieId){return SERIES.find(s=>s.id===serieId)}

function renderPortada(libro){
  const serie = getSerie(libro.serie);
  const s = libro.serie;
  const titleLines = libro.titulo.split('\n');
  const geo = s===0?'5P':s===1?'P1':s===2?'P2':s===3?'P3':s===4?'P4':s===5?'P4':s===6?'P5':s===7?'₿':s===8?'🛡':s===9?'₿':s===10?'%':'5P';
  const bookNumLabel = libro.id===0 ? 'Libro 0 — Libro Madre' : `Serie ${libro.serie} · Libro ${libro.numSerie} de 10`;
  return `<div class="portada" style="--primary:${serie.primary};--accent:${serie.accent};--light:${serie.light}">
    <div class="deco-top"></div>
    <div class="deco-line"></div>
    <div class="deco-circle"></div>
    <div class="serie-band">
      <span class="serie-num">${serie.shortName}</span>
      <span class="sep">·</span>
      <span class="serie-name">${serie.nombre}</span>
    </div>
    <div class="content">
      <div class="book-number">${bookNumLabel}</div>
      <div class="main-title" style="font-size:${libro.titleSize}">${titleLines.join('<br>')}</div>
      <div class="accent-line"></div>
      <div class="subtitle">${libro.subtitulo}</div>
    </div>
    <div class="bottom-band">
      <span class="author">Método 5P · Finanzas Personales</span>
      <span class="metodo-badge">Método 5P</span>
    </div>
  </div>`;
}

function renderContraportada(libro){
  const serie = getSerie(libro.serie);
  const bookNumLabel = libro.id===0 ? 'Libro 0 — Libro Madre' : `Serie ${libro.serie} · Libro ${libro.numSerie} de 10`;
  const bulletsHtml = libro.bullets.map(b=>`<div class="cp-bullet">${b}</div>`).join('');
  return `<div class="contraportada" style="--primary:${serie.primary};--accent:${serie.accent};--light:${serie.light}">
    <div class="top-stripe"></div>
    <div class="cp-header">
      <div class="cp-tagline">${libro.tagline}</div>
      <div class="cp-title-small">${libro.tituloLargo}</div>
    </div>
    <div class="cp-body">
      <div class="cp-accent-bar"></div>
      <div class="cp-sinopsis">${libro.sinopsis}</div>
      <div class="cp-bullets">${bulletsHtml}</div>
    </div>
    <div class="cp-footer">
      <div class="cp-serie-info">
        <strong>${serie.nombre}</strong>
        ${bookNumLabel}<br>
        El Método 5P · Finanzas Personales
      </div>
      <div class="barcode-area">ISBN<br>_ _ _ _ _</div>
    </div>
  </div>`;
}

function renderBook(idx){
  const libro = LIBROS[idx];
  const serie = getSerie(libro.serie);

  document.querySelector('#covers-row .cover-wrap:first-child').innerHTML =
    '<div class="cover-label">Portada</div>' + renderPortada(libro);
  document.querySelector('#covers-row .cover-wrap:last-child').innerHTML =
    '<div class="cover-label">Contraportada</div>' + renderContraportada(libro);

  document.getElementById('hdr-badge').textContent = serie.nombre;
  document.getElementById('hdr-badge').style.background = serie.accent;
  document.getElementById('hdr-badge').style.color = serie.primary;
  document.getElementById('hdr-meta').textContent = libro.id===0 ? 'Libro Madre' : `Libro ${libro.numTotal} de 100 · ${libro.tituloLargo}`;
  document.getElementById('counter').textContent = `${idx+1} / ${LIBROS.length}`;

  document.querySelectorAll('.book-item').forEach(el=>el.classList.remove('active'));
  const activeEl = document.querySelector(`.book-item[data-idx="${idx}"]`);
  if(activeEl){activeEl.classList.add('active');activeEl.scrollIntoView({block:'nearest'});}

  currentIdx = idx;
}

function navigate(dir){
  const next = (currentIdx+dir+LIBROS.length)%LIBROS.length;
  renderBook(next);
}

function buildSidebar(){
  const container = document.getElementById('book-list');
  let html = '';
  let currentSerie = -1;
  LIBROS.forEach((libro,idx)=>{
    if(libro.serie!==currentSerie){
      currentSerie=libro.serie;
      const serie=getSerie(libro.serie);
      if(idx>0)html+='</div>';
      html+=`<div class="serie-group"><div class="serie-label" style="border-left:3px solid ${serie.accent};padding-left:13px">${serie.nombre}</div>`;
    }
    const numLabel = libro.id===0?'Libro 0':libro.numTotal;
    html+=`<div class="book-item" data-idx="${idx}" style="--accent:${getSerie(libro.serie).accent}" onclick="renderBook(${idx})">
      <div class="num">${numLabel}</div>
      <div class="title">${libro.tituloLargo}</div>
    </div>`;
  });
  html+='</div>';
  container.innerHTML=html;
}

function filterBooks(query){
  const q=query.toLowerCase();
  document.querySelectorAll('.book-item').forEach(el=>{
    const title=el.querySelector('.title').textContent.toLowerCase();
    el.style.display=title.includes(q)?'block':'none';
  });
}

// Init
buildSidebar();
renderBook(0);

// Keyboard nav
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')navigate(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')navigate(-1);
});
</script>
