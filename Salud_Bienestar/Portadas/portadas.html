<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: #0d1f0d; color: #eee; min-height: 100vh; }

  .nav-bar {
    background: #0a1a0a;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 2px solid #1a5c1a;
  }
  .nav-bar h1 { font-size: 14px; color: #4ade80; font-weight: bold; letter-spacing: 1px; flex: 1; min-width: 200px; }
  .nav-bar select { background: #0f2f0f; color: #eee; border: 1px solid #4ade80; padding: 6px 10px; border-radius: 4px; font-size: 13px; max-width: 400px; flex: 2; }
  .nav-btn { background: #16a34a; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; white-space: nowrap; }
  .nav-btn:hover { background: #15803d; }
  .nav-btn:disabled { background: #555; cursor: not-allowed; }
  .nav-counter { color: #aaa; font-size: 12px; white-space: nowrap; }
  .toggle-btn { background: #0f2f0f; color: #4ade80; border: 1px solid #4ade80; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; }

  .book-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    padding: 40px 20px;
    flex-wrap: wrap;
  }

  .portada {
    width: 320px;
    height: 480px;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 32px 28px;
    box-shadow: -8px 8px 30px rgba(0,0,0,0.7), 4px 0 0 rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
  }
  .portada::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 12px;
    background: rgba(0,0,0,0.2);
  }
  .portada-top { position: relative; z-index: 1; }
  .portada-coleccion { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.7; margin-bottom: 8px; }
  .portada-serie { font-size: 11px; letter-spacing: 1px; opacity: 0.8; margin-bottom: 24px; }
  .portada-num { font-size: 64px; font-weight: bold; opacity: 0.15; position: absolute; right: 0; top: -10px; line-height: 1; }
  .portada-title { font-size: 22px; line-height: 1.3; font-weight: bold; margin-bottom: 14px; }
  .portada-subtitle { font-size: 12px; line-height: 1.5; opacity: 0.8; font-style: italic; }
  .portada-bottom { position: relative; z-index: 1; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 12px; }
  .portada-autor { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; }
  .portada-metodo { font-size: 11px; letter-spacing: 1px; opacity: 0.8; margin-top: 4px; }
  .portada-deco {
    position: absolute;
    bottom: -30px;
    right: -30px;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .portada-deco2 {
    position: absolute;
    bottom: 40px;
    right: 40px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }

  .contraportada {
    width: 320px;
    height: 480px;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 28px;
    box-shadow: 8px 8px 30px rgba(0,0,0,0.7), -4px 0 0 rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
  }
  .contra-top { }
  .contra-coleccion { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.5; margin-bottom: 16px; }
  .contra-quote {
    font-size: 14px;
    line-height: 1.7;
    font-style: italic;
    opacity: 0.9;
    border-left: 3px solid rgba(255,255,255,0.3);
    padding-left: 14px;
    margin-bottom: 16px;
  }
  .contra-desc { font-size: 12px; line-height: 1.8; opacity: 0.75; }
  .contra-bottom { }
  .contra-serie-info { font-size: 10px; opacity: 0.6; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 10px; margin-top: 10px; }
  .contra-isbn { font-size: 10px; opacity: 0.4; font-family: monospace; margin-top: 6px; }
  .contra-badge { display: inline-block; background: rgba(255,255,255,0.15); border-radius: 12px; padding: 3px 10px; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }

  .label-tag { text-align: center; font-size: 11px; color: #aaa; margin-top: 8px; letter-spacing: 1px; }
  .book-wrapper { display: flex; flex-direction: column; align-items: center; }
</style>
</head>

  {num:16, title:"El dolor de espalda que podría evitarse", subtitle:"Las causas reales, los remedios que funcionan y lo que perpetúa el problema", serie:"Serie 2: Movimiento y cuerpo — Libro 6 de 10", desc:"El dolor de espalda es la primera causa de baja laboral en el mundo. Este libro explica sus causas reales y ofrece intervenciones con evidencia, más allá de los analgésicos y el reposo."},

  {num:18, title:"El cuerpo después de los 40", subtitle:"Cómo cambia el metabolismo y cómo adaptar el ejercicio y la alimentación", serie:"Serie 2: Movimiento y cuerpo — Libro 8 de 10", desc:"El metabolismo cambia a partir de los 40, pero esos cambios no son inevitables ni irreversibles. Este libro explica qué ocurre y cómo adaptar el entrenamiento y la nutrición para seguir progresando."},
  {num:19, title:"Actividad física y enfermedades crónicas", subtitle:"Mover el cuerpo cuando duele o cuando hay diagnósticos establecidos", serie:"Serie 2: Movimiento y cuerpo — Libro 9 de 10", desc:"El ejercicio es medicina, incluso —especialmente— cuando hay enfermedades crónicas. Este libro guía a personas con diabetes, hipertensión, artritis u otras condiciones sobre cómo moverse de forma segura."},
  {num:20, title:"Del sofá a los 5 kilómetros", subtitle:"El plan de 12 semanas que sí funciona para empezar a correr", serie:"Serie 2: Movimiento y cuerpo — Libro 10 de 10", desc:"El plan Couch to 5K ha funcionado para millones de personas. Este libro adapta ese enfoque al corredor hispanohablante, con contexto médico, motivacional y práctico."},
  // Serie 3 — Sueño
  {num:21, title:"El sueño que nunca tienes", subtitle:"Por qué dormir bien es la base de todo lo demás y cómo conseguirlo", serie:"Serie 3: Sueño y descanso — Libro 1 de 10", desc:"El sueño es el proceso de restauración más importante del cuerpo. Este libro explica qué ocurre durante el sueño, por qué la falta crónica daña la salud y cómo construir un sueño de calidad."},
  {num:22, title:"Insomnio: Causas reales y soluciones que funcionan", subtitle:"Sin pastillas de por vida: el tratamiento que los médicos no siempre tienen tiempo de explicar", serie:"Serie 3: Sueño y descanso — Libro 2 de 10", desc:"La terapia cognitivo-conductual para el insomnio (TCC-I) es más eficaz que los fármacos a largo plazo. Este libro explica el método paso a paso."},
  {num:23, title:"La ciencia del ritmo circadiano", subtitle:"Por qué importa a qué hora comes, te mueves y duermes", serie:"Serie 3: Sueño y descanso — Libro 3 de 10", desc:"El reloj biológico regula casi todas las funciones del cuerpo. Este libro explica la ciencia circadiana y cómo sincronizar el comportamiento con los ritmos naturales del organismo."},
  {num:24, title:"El cansancio que no se va durmiendo", subtitle:"Fatiga crónica, tiroides, anemia y otras causas médicas del agotamiento persistente", serie:"Serie 3: Sueño y descanso — Libro 4 de 10", desc:"No todo cansancio se soluciona durmiendo más. Este libro guía al lector por las causas médicas más frecuentes del agotamiento persistente y cuándo pedir ayuda."},
  {num:25, title:"Pantallas, luz azul y el robo de tu sueño", subtitle:"Cómo la tecnología destruye el descanso y qué hacer al respecto", serie:"Serie 3: Sueño y descanso — Libro 5 de 10", desc:"La luz azul de las pantallas suprime la melatonina y retrasa el sueño. Este libro explica el mecanismo y ofrece estrategias prácticas que no implican abandonar la tecnología."},
  {num:26, title:"Dormir en pareja cuando uno de los dos no deja dormir", subtitle:"Ronquidos, apnea y soluciones prácticas para recuperar el descanso compartido", serie:"Serie 3: Sueño y descanso — Libro 6 de 10", desc:"Los ronquidos y la apnea del sueño afectan a millones de parejas. Este libro explica las causas, los tratamientos y cómo recuperar el descanso compartido."},
  {num:27, title:"La siesta: De estigma a herramienta", subtitle:"Cómo usar el descanso diurno para rendir más, sin arruinar el sueño nocturno", serie:"Serie 3: Sueño y descanso — Libro 7 de 10", desc:"La ciencia del sueño rehabilita la siesta. Este libro explica cuánto, cuándo y cómo dormir durante el día para obtener beneficios cognitivos sin afectar el sueño nocturno."},
  {num:28, title:"Dormir con ansiedad", subtitle:"Cuando la mente no para y el cuerpo no descansa: herramientas que funcionan", serie:"Serie 3: Sueño y descanso — Libro 8 de 10", desc:"La ansiedad y el insomnio forman un ciclo vicioso que se retroalimenta. Este libro ofrece técnicas específicas para interrumpirlo, basadas en la neurociencia del sueño y la ansiedad."},
  {num:29, title:"El sueño de los hijos y el desvelo de los padres", subtitle:"Rutinas de sueño para toda la familia cuando el cansancio amenaza con ser el estado permanente", serie:"Serie 3: Sueño y descanso — Libro 9 de 10", desc:"Los padres de niños pequeños son el grupo más privado de sueño. Este libro ofrece estrategias para mejorar el sueño familiar sin recurrir a métodos que contradigan los instintos parentales."},
  {num:30, title:"Recuperación: El descanso activo que también es entrenamiento", subtitle:"Más allá del sueño nocturno: todas las formas en que el cuerpo y la mente se reparan", serie:"Serie 3: Sueño y descanso — Libro 10 de 10", desc:"La recuperación no es solo dormir: incluye el descanso activo, la nutrición post-esfuerzo, la gestión del sistema nervioso y las técnicas de recuperación más eficaces."},
  // Serie 4 — Mente

  {num:34, title:"Mindfulness sin incienso ni postureo", subtitle:"Meditación práctica para quien no tiene tiempo, no cree en las modas y necesita resultados reales", serie:"Serie 4: Mente y emociones — Libro 4 de 10", desc:"El mindfulness tiene sólida evidencia científica al margen del misticismo que lo rodea. Este libro extrae las técnicas con mayor respaldo y las adapta para personas escépticas y ocupadas."},
  {num:35, title:"El burnout que llega sin avisar", subtitle:"Reconocer el agotamiento profesional antes de que sea crisis y construir la salida", serie:"Serie 4: Mente y emociones — Libro 5 de 10", desc:"El burnout tiene fases que se pueden identificar antes del colapso. Este libro explica las señales tempranas y ofrece un plan de salida que no requiere abandonar el trabajo ni la vida."},
  {num:36, title:"Emociones y alimentación", subtitle:"Por qué comes cuando no tienes hambre y cómo romper el ciclo sin culpa", serie:"Serie 4: Mente y emociones — Libro 6 de 10", desc:"La alimentación emocional no es debilidad: es un mecanismo de regulación aprendido. Este libro explica sus raíces y ofrece alternativas que funcionan sin necesidad de fuerza de voluntad permanente."},
  {num:37, title:"La soledad: El factor de riesgo que nadie habla", subtitle:"Conexión social y salud física: la ciencia detrás del vínculo más ignorado de la medicina", serie:"Serie 4: Mente y emociones — Libro 7 de 10", desc:"La soledad crónica tiene el mismo impacto en la mortalidad que fumar 15 cigarrillos al día. Este libro documenta la evidencia y ofrece un camino hacia la reconexión."},
  {num:38, title:"Tu cerebro bajo presión", subtitle:"Cómo el estrés afecta la memoria, la concentración y las decisiones — y qué hacer para proteger el cerebro", serie:"Serie 4: Mente y emociones — Libro 8 de 10", desc:"El estrés crónico produce cambios estructurales en el cerebro. Este libro explica cuáles son, cómo se detectan y qué intervenciones tienen evidencia para revertirlos."},
  {num:39, title:"Gestión emocional para personas con enfermedades crónicas", subtitle:"Vivir bien cuando el cuerpo duele: herramientas reales para una carga que no desaparece", serie:"Serie 4: Mente y emociones — Libro 9 de 10", desc:"Vivir con una enfermedad crónica tiene un componente emocional que el sistema sanitario frecuentemente no atiende. Este libro ofrece herramientas concretas para esa dimensión del cuidado."},
  {num:40, title:"La salud mental es salud", subtitle:"Desmontar el estigma, integrar la psicología en el cuidado y construir bienestar psicológico duradero", serie:"Serie 4: Mente y emociones — Libro 10 de 10", desc:"El bienestar psicológico no es la ausencia de síntomas: es un estado que se puede construir activamente. Este libro integra la psicología positiva con el tratamiento de los problemas reales."},
  // Serie 5 — Prevención

  {num:45, title:"Diabetes tipo 2: La epidemia que podemos frenar", subtitle:"Prevención, diagnóstico precoz y control sin fatalismo — porque la diabetes tipo 2 no es inevitable", serie:"Serie 5: Prevención y chequeos — Libro 5 de 10", desc:"La diabetes tipo 2 es en gran medida prevenible y en muchos casos reversible. Este libro explica el mecanismo, los factores de riesgo modificables y las intervenciones con mayor evidencia."},
  {num:46, title:"El cáncer que podría detectarse antes", subtitle:"Cribados, revisiones y factores de riesgo modificables: lo que la ciencia dice que funciona", serie:"Serie 5: Prevención y chequeos — Libro 6 de 10", desc:"El 40% de los cánceres son prevenibles con cambios de estilo de vida. Este libro explica qué cribados funcionan, cuáles no tienen evidencia y cómo reducir el riesgo sin caer en el alarmismo."},

  {num:48, title:"Vacunas para adultos", subtitle:"Las que necesitas después de los 40 y por qué la inmunización no termina con la infancia", serie:"Serie 5: Prevención y chequeos — Libro 8 de 10", desc:"El calendario vacunal adulto es uno de los grandes olvidados de la medicina preventiva. Este libro explica cuáles son las vacunas recomendadas según la edad y el estado de salud."},

  {num:50, title:"Medicina preventiva desde los 30", subtitle:"El plan de chequeos, revisiones y hábitos según la edad — porque la prevención no espera a los síntomas", serie:"Serie 5: Prevención y chequeos — Libro 10 de 10", desc:"Un plan de salud preventiva por décadas: qué revisar, cuándo y cómo construir los hábitos que protegen la salud a lo largo de toda la vida."},
  // Serie 6 — Hábitos
  {num:51, title:"Por qué los buenos hábitos no duran", subtitle:"La neurociencia del cambio de hábitos: por qué fallamos y cómo dejar de hacerlo", serie:"Serie 6: Hábitos y rutinas — Libro 1 de 10", desc:"El problema no es la falta de voluntad: es el desconocimiento del proceso neurológico del hábito. Este libro explica cómo funciona el cerebro al cambiar comportamientos y cómo usar ese conocimiento."},
  {num:52, title:"El hábito más importante que puedes tener", subtitle:"La rutina de mañana que lo cambia todo — y cómo construirla sin que sea otra cosa que no puedes sostener", serie:"Serie 6: Hábitos y rutinas — Libro 2 de 10", desc:"Las primeras horas del día establecen el patrón del resto. Este libro ofrece un sistema para construir una rutina matutina personalizada y realista para distintos tipos de vida."},
  {num:53, title:"Pequeños cambios, grandes resultados", subtitle:"El método kaizen aplicado a la salud: por qué los cambios mínimos y consistentes ganan a los grandes y explosivos", serie:"Serie 6: Hábitos y rutinas — Libro 3 de 10", desc:"El cambio sostenible viene de la acumulación de pequeños pasos, no de las resoluciones de enero. Este libro aplica la filosofía del kaizen a los hábitos de salud con ejemplos concretos."},
  {num:54, title:"Las recaídas no son fracasos", subtitle:"Por qué volver a empezar es parte del proceso — y cómo hacerlo sin destruirse en el intento", serie:"Serie 6: Hábitos y rutinas — Libro 4 de 10", desc:"La recaída es parte predecible del proceso de cambio, no un indicador de fracaso personal. Este libro explica el modelo transteórico del cambio y cómo usar las recaídas como información."},

  {num:56, title:"El hábito del movimiento", subtitle:"Cómo incorporar más actividad en una vida sedentaria sin ir al gimnasio ni tener tiempo extra", serie:"Serie 6: Hábitos y rutinas — Libro 6 de 10", desc:"El movimiento no requiere ir al gimnasio: se puede incorporar en la vida cotidiana de formas que la ciencia respalda. Este libro explica cómo hacerlo de forma sostenible."},

  // Serie 8 — Sexual

let current = 0;
let showPortada = true;

function getPalette(num) {
  return PALETTE[num] || PALETTE[0];
}

function buildBookHTML(book) {
  const p = getPalette(book.num);
  const numLabel = String(book.num);

  const portadaHTML = `
    <div class="book-wrapper">
      <div class="portada" style="background: linear-gradient(145deg, ${p.from}, ${p.to}); color: ${p.text};">
        <div class="portada-top">
          <div class="portada-coleccion">Salud y Bienestar</div>
          <div class="portada-serie">${book.serie}</div>
          <div class="portada-num" style="color:${p.accent}">${numLabel}</div>
          <div class="portada-title">${book.title}</div>
          <div class="portada-subtitle">${book.subtitle}</div>
        </div>
        <div class="portada-bottom">
          <div class="portada-autor">El Método RESET</div>
          <div class="portada-metodo" style="color:${p.accent}">● ${book.serie.split('—')[0].trim()}</div>
        </div>
        <div class="portada-deco"></div>
        <div class="portada-deco2"></div>
      </div>
      <div class="label-tag">PORTADA</div>
    </div>`;

  const contraportadaHTML = `
    <div class="book-wrapper">
      <div class="contraportada" style="background: linear-gradient(145deg, ${p.to}, ${p.from}); color: ${p.text};">
        <div class="contra-top">
          <div class="contra-coleccion">Salud y Bienestar</div>
          <div class="contra-badge" style="background:${p.accent}20; color:${p.accent}">Libro ${numLabel}</div>
          <div class="contra-quote">"${book.title}"</div>
          <div class="contra-desc">${book.desc}</div>
        </div>
        <div class="contra-bottom">
          <div class="contra-serie-info">${book.serie}</div>
          <div class="contra-isbn" style="color:${p.accent}">El Método RESET — Colección completa: 100 libros + Libro Madre</div>
        </div>
      </div>
      <div class="label-tag">CONTRAPORTADA</div>
    </div>`;

  return showPortada ? portadaHTML + contraportadaHTML : contraportadaHTML + portadaHTML;
}

function render() {
  const book = books[current];
  document.getElementById('bookContainer').innerHTML = buildBookHTML(book);
  document.getElementById('counter').textContent = `${current + 1} / ${books.length}`;
  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').disabled = current === books.length - 1;
  document.getElementById('bookSelect').value = current;
}

function next() { if (current < books.length - 1) { current++; render(); } }
function prev() { if (current > 0) { current--; render(); } }
function goToBook(idx) { current = parseInt(idx); render(); }
function toggleView() {
  showPortada = !showPortada;
  document.getElementById('toggleBtn').textContent = showPortada ? 'Ver portada primero' : 'Ver contraportada primero';
  render();
}

const sel = document.getElementById('bookSelect');
books.forEach((b, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = `${b.num === 0 ? 'Libro 0 (Madre)' : 'Libro ' + b.num} — ${b.title}`;
  sel.appendChild(opt);
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
});

render();
</script>
