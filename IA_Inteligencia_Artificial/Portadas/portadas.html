let cur = 0;
let showPortada = true;
const serieNames = {S1:'Serie 1: Fundamentos de IA',S2:'Serie 2: IA en el Trabajo',S3:'Serie 3: Herramientas de IA',S4:'Serie 4: IA y Creatividad',S5:'Serie 5: IA y Datos',S6:'Serie 6: IA y Negocios',S7:'Serie 7: Etica y Sociedad',S8:'Serie 8: IA y Educacion',S9:'Serie 9: Futuro del Trabajo',S10:'Serie 10: IA y el Ser Humano','Libro Madre':'Libro Madre'};

function buildSelect(){
  const sel = document.getElementById('sel');
  sel.innerHTML = '';
  books.forEach((b,i) => {
    const o = document.createElement('option');
    o.value = i;
    o.text = 'Libro ' + b.num + ': ' + b.title.substring(0,45) + (b.title.length > 45 ? '...' : '');
    sel.appendChild(o);
  });
}

function render(){
  const b = books[cur];
  document.getElementById('cnt').textContent = 'Libro ' + (cur+1) + ' de ' + books.length + ' | ' + (showPortada ? 'Portada' : 'Contraportada');
  document.getElementById('sel').value = cur;
  document.getElementById('pB').disabled = cur === 0;
  document.getElementById('nB').disabled = cur === books.length - 1;
  const bc = document.getElementById('bc');
  if(showPortada){
    bc.innerHTML = portadaHTML(b);
  } else {
    bc.innerHTML = contraportadaHTML(b);
  }
}

function portadaHTML(b){
  return '<div class="bk" style="background:linear-gradient(135deg,'+b.c1+','+b.c2+');color:'+b.tc+'">'+
    '<div class="badge">Portada</div>'+
    '<div class="bn">'+b.num+'</div>'+
    '<div class="bs">'+b.serie+'</div>'+
    '<div class="bt">'+b.title+'</div>'+
    '<div class="bsu">'+b.sub+'</div>'+
    '<div class="bd">'+b.desc+'</div>'+
    '<div class="bf">Inteligencia Artificial Aplicada &mdash; Metodo NOVA</div>'+
    '<button onclick="toggle()" style="margin-top:12px;padding:6px 14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:'+b.tc+';border-radius:6px;cursor:pointer;font-size:.78em">Ver Contraportada</button>'+
  '</div>';
}

function contraportadaHTML(b){
  const sn = serieNames[b.serie] || b.serie;
  return '<div class="bk" style="background:linear-gradient(135deg,'+b.c2+','+b.c1+');color:'+b.tc+'">'+
    '<div class="badge">Contraportada</div>'+
    '<div class="bn">'+b.num+'</div>'+
    '<div class="bs">'+sn+'</div>'+
    '<div class="bt">'+b.title+'</div>'+
    '<div class="bd" style="font-size:.85em;line-height:1.7">'+b.desc+'</div>'+
    '<div class="bd" style="margin-top:12px;font-style:italic;opacity:.6">Coleccion: Inteligencia Artificial Aplicada &bull; 101 libros &bull; 10 series</div>'+
    '<button onclick="toggle()" style="margin-top:12px;padding:6px 14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:'+b.tc+';border-radius:6px;cursor:pointer;font-size:.78em">Ver Portada</button>'+
  '</div>';
}

function nav(d){cur = Math.max(0,Math.min(books.length-1,cur+d));showPortada=true;render();}
function jump(v){cur=parseInt(v);showPortada=true;render();}
function toggle(){showPortada=!showPortada;render();}

document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')nav(-1);if(e.key==='ArrowRight')nav(1);});

buildSelect();render();
</script>
